name: Heal Missing Roasts

on:
  schedule:
    # 12:30 AM IST = 19:00 UTC
    - cron: "0 19 * * *"
    # 8:00 AM IST = 02:30 UTC
    - cron: "30 2 * * *"
    # 5:00 PM IST = 11:30 UTC
    - cron: "30 11 * * *"

  # Allows manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  heal-roasts:
    name: Heal Missing AI Roasts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    env:
      DATABASE_URL:     ${{ secrets.DATABASE_URL }}
      GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
      NODE_ENV:         production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run addroast healer script
        run: npx tsx scripts/addroast.ts
