name: IPL Live Match Ingestion

on:
  # Runs daily at 2:00 AM IST = 20:30 UTC (IST is UTC+5:30)
  schedule:
    - cron: "30 20 * * *"

  # Allows manual trigger from the GitHub Actions tab — useful for testing
  # without waiting for the scheduled run.
  workflow_dispatch:

jobs:
  ingest:
    name: Ingest Latest IPL Match
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run live ingestion script
        env:
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          CRICEKT_DATA_API: ${{ secrets.CRICEKT_DATA_API }}
          NODE_ENV:         production
        run: npx tsx scripts/ingest-live.ts
